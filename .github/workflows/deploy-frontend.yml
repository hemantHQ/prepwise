name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure backend URL
        run: |
          if [ -z "${{ secrets.BACKEND_API_URL }}" ]; then
            echo "Missing BACKEND_API_URL repository secret."
            exit 1
          fi
          cat > frontend/config.js <<'EOF'
          window.APP_CONFIG = {
            API_BASE_URL: "${{ secrets.BACKEND_API_URL }}"
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
